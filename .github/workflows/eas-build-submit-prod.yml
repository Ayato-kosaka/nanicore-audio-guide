name: EAS Build Submit Prod

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/**'

jobs:
  build-submit-prod:
    name: EAS Build and Submit (Prod)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: expo

    steps:
      - name: ⏬ Checkout repository
        uses: actions/checkout@v4

      - name: 🟣 Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.8.0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📝 Create .env file for production + submit
        run: |
          echo 'EXPO_PUBLIC_NODE_ENV=production' >> .env
          echo 'EXPO_PUBLIC_COMMIT_ID=${{ github.sha }}' >> .env
          echo 'EXPO_PUBLIC_CLOUD_FUNCTION_BASE_URL=${{ secrets.EXPO_PUBLIC_CLOUD_FUNCTION_BASE_URL_PROD }}' >> .env
          echo 'EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL_PROD }}' >> .env
          echo 'EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY_PROD }}' >> .env
          echo 'EXPO_PUBLIC_DB_SCHEMA=public' >> .env
          echo 'EXPO_PUBLIC_GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME_PROD }}' >> .env
          echo 'EXPO_PUBLIC_GCS_STATIC_MASTER_DIR_PATH=${{ secrets.GCS_STATIC_MASTER_DIR_PATH_PROD }}' >> .env
          echo 'EXPO_PUBLIC_ADMOB_IOS_INTERSTITIAL_UNIT_ID=${{ secrets.EXPO_PUBLIC_ADMOB_IOS_INTERSTITIAL_UNIT_ID_PROD }}' >> .env
          echo 'EXPO_PUBLIC_ADMOB_ANDROID_INTERSTITIAL_UNIT_ID=${{ secrets.EXPO_PUBLIC_ADMOB_ANDROID_INTERSTITIAL_UNIT_ID_PROD }}' >> .env

      - name: 🏗 Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
          APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          ASC_APP_ID: ${{ secrets.EXPO_ASC_APP_ID }}

      - name: 🚀 Build and Submit App (production)
        run: pnpx eas-cli build --profile production --platform all --non-interactive --no-wait --auto-submit
