name: EAS Build Preview Prod

on:
  workflow_dispatch:

jobs:
  build-preview-prod:
    name: EAS Build (Preview Prod)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: expo

    steps:
      - name: ⏬ Checkout repository
        uses: actions/checkout@v4

      - name: 🟣 Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.8.0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗 Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}

      - name: 🚀 Build app (production preview)
        env:
          EXPO_PUBLIC_NODE_ENV: production
          EXPO_PUBLIC_COMMIT_ID: ${{ github.sha }}
          EXPO_PUBLIC_CLOUD_FUNCTION_BASE_URL: ${{ secrets.EXPO_PUBLIC_CLOUD_FUNCTION_BASE_URL_PROD }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL_PROD }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY_PROD }}
          EXPO_PUBLIC_DB_SCHEMA: public
          EXPO_PUBLIC_GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME_PROD }}
          EXPO_PUBLIC_GCS_STATIC_MASTER_DIR_PATH: ${{ secrets.GCS_STATIC_MASTER_DIR_PATH_PROD }}
          EXPO_PUBLIC_ADMOB_IOS_INTERSTITIAL_UNIT_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_IOS_INTERSTITIAL_UNIT_ID_TEST }}
          EXPO_PUBLIC_ADMOB_ANDROID_INTERSTITIAL_UNIT_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_ANDROID_INTERSTITIAL_UNIT_ID_TEST }}
        run: pnpx eas-cli build --profile preview --platform all --non-interactive --no-wait --clear-cache
